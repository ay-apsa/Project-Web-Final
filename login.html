<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Jelajah Dunia Bersama Afsyah</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <header>
      <img src="LogoAku2.png" class="logo" alt="logo Afsyah" />
      <nav class="menu">
        <a href="index.html">Home</a>
        <a href="destinasi.html">Destinasi</a>
        <a href="paket wisata.html">Paket Wisata</a>
        <a href="kontak.html">Kontak</a>
      </nav>
      <div class="akun-dropdown">
    <button class="akun-btn">👤</button>

    <div class="dropdown-content">
        <a href="login.html">Login</a>
        <a href="register.html">Registrasi</a>
    </div>
</div>
    </header>

    <section class="beranda">
      <div class="auth-box">
        <h2>Login</h2>
        <p class="subtitle">Masuk untuk melanjutkan perjalananmu ✨</p>

        <form id="loginForm">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Masukkan email" required />

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password" required />

          <button type="submit" class="btn">Login</button>
        </form>

        <p class="switch">
          Belum punya akun? <a href="register.html">Daftar di sini</a>
        </p>
      </div>
    </section>

    <div class="container-footer">
      <p>© 2026 Jelajah Dunia Bersama Afsyah</p>
    </div>

    <script src="login.js"></script>
  </body>
</html>
